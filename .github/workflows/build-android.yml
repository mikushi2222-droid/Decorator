name: Сборка Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия (например v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Определить версию
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="dev-$(git rev-parse --short HEAD)"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Scaffold Flutter-проекта
        run: |
          flutter create --org com.ooo_akcent --project-name decorator /tmp/app
          cp -r mobile/lib              /tmp/app/
          cp -r mobile/assets           /tmp/app/
          cp    mobile/pubspec.yaml     /tmp/app/
          cp    mobile/analysis_options.yaml /tmp/app/

      - name: Версия в pubspec.yaml
        run: |
          sed -i "s/^version:.*/version: ${{ steps.ver.outputs.version }}+1/" /tmp/app/pubspec.yaml

      - name: Русское имя приложения
        run: |
          F=/tmp/app/android/app/src/main/res/values/strings.xml
          mkdir -p "$(dirname "$F")"
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">Декоратор</string>\n</resources>\n' > "$F"

      - name: flutter pub get
        run: flutter pub get
        working-directory: /tmp/app

      - name: flutter build apk
        run: flutter build apk --release --split-per-abi
        working-directory: /tmp/app

      - name: Переименовать APK
        run: |
          VER="${{ steps.ver.outputs.version }}"
          SRC="/tmp/app/build/app/outputs/flutter-apk"
          mkdir -p dist
          cp "$SRC/app-arm64-v8a-release.apk"  "dist/Decorator-${VER}-arm64.apk"
          cp "$SRC/app-armeabi-v7a-release.apk" "dist/Decorator-${VER}-arm32.apk"
          cp "$SRC/app-x86_64-release.apk"      "dist/Decorator-${VER}-x86_64.apk"

      - name: Загрузить артефакт (все запуски)
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.ver.outputs.version }}
          path: dist/
          retention-days: 30

      - name: GitHub Release (только тег или dispatch)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Декоратор ${{ steps.ver.outputs.version }}
          body: |
            ## Android APK

            | Файл | Архитектура | Устройства |
            |------|-------------|------------|
            | `Decorator-*-arm64.apk` | arm64-v8a | Современные телефоны ✅ |
            | `Decorator-*-arm32.apk` | armeabi-v7a | Старые телефоны |
            | `Decorator-*-x86_64.apk` | x86_64 | Эмуляторы |

            **Установка:** Настройки → Безопасность → Разрешить установку из неизвестных источников.

            ### Windows (.exe)
            Файл `Декоратор.exe` — в вложениях ниже.
          files: |
            dist/Decorator-${{ steps.ver.outputs.version }}-arm64.apk
            dist/Decorator-${{ steps.ver.outputs.version }}-arm32.apk
            dist/Decorator-${{ steps.ver.outputs.version }}-x86_64.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
