name: Сборка Android APK

on:
  push:
    branches: [main, 'claude/**']
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия (например v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Определить версию
        id: ver
        run: |
          SHA=$(git rev-parse --short HEAD)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
            VERSION="${TAG#v}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            # dev-сборка с main: версия из pubspec, метка — короткий SHA
            TAG="dev-$SHA"
            VERSION=""
          fi
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "label=${VERSION:-dev-$SHA}" >> "$GITHUB_OUTPUT"

      - name: Скачать шрифты NotoSans
        run: |
          mkdir -p mobile/assets/fonts
          sudo apt-get install -y fonts-noto-core 2>/dev/null || true
          REGULAR=$(find /usr/share/fonts -iname "NotoSans-Regular.ttf" 2>/dev/null | head -1)
          BOLD=$(find /usr/share/fonts -iname "NotoSans-Bold.ttf" 2>/dev/null | head -1)
          ITALIC=$(find /usr/share/fonts -iname "NotoSans-Italic.ttf" 2>/dev/null | head -1)
          [ -n "$REGULAR" ] && cp "$REGULAR" mobile/assets/fonts/NotoSans-Regular.ttf || true
          [ -n "$BOLD" ]    && cp "$BOLD"    mobile/assets/fonts/NotoSans-Bold.ttf    || true
          [ -n "$ITALIC" ]  && cp "$ITALIC"  mobile/assets/fonts/NotoSans-Italic.ttf  || true
          BASE="https://github.com/googlefonts/noto-fonts/raw/refs/heads/main/hinted/ttf/NotoSans"
          [ ! -f mobile/assets/fonts/NotoSans-Regular.ttf ] && wget -q "$BASE/NotoSans-Regular.ttf" -O mobile/assets/fonts/NotoSans-Regular.ttf || true
          [ ! -f mobile/assets/fonts/NotoSans-Bold.ttf ]    && wget -q "$BASE/NotoSans-Bold.ttf"    -O mobile/assets/fonts/NotoSans-Bold.ttf    || true
          [ ! -f mobile/assets/fonts/NotoSans-Italic.ttf ]  && wget -q "$BASE/NotoSans-Italic.ttf"  -O mobile/assets/fonts/NotoSans-Italic.ttf  || true
          ls -lh mobile/assets/fonts/
          # Проверка: без шрифтов PDF выйдет «квадратиками», поэтому валим сборку явно.
          for f in NotoSans-Regular.ttf NotoSans-Bold.ttf NotoSans-Italic.ttf; do
            p="mobile/assets/fonts/$f"
            if [ ! -s "$p" ] || [ "$(stat -c%s "$p")" -lt 50000 ]; then
              echo "::error::Шрифт $f отсутствует или слишком мал — PDF будет сломан."
              exit 1
            fi
          done

      - name: Scaffold Flutter-проекта
        run: |
          flutter create --org com.ooo_akcent --project-name decorator /tmp/app
          cp -r mobile/lib              /tmp/app/
          cp -r mobile/assets           /tmp/app/
          cp    mobile/pubspec.yaml     /tmp/app/
          cp    mobile/analysis_options.yaml /tmp/app/

      - name: Версия в pubspec.yaml
        run: |
          VER="${{ steps.ver.outputs.version }}"
          # обновляем только для релизов с валидным semver; dev-сборки оставляем как есть
          if [ -n "$VER" ]; then
            sed -i "s/^version:.*/version: ${VER}+1/" /tmp/app/pubspec.yaml
          fi

      - name: Русское имя приложения
        run: |
          F=/tmp/app/android/app/src/main/res/values/strings.xml
          mkdir -p "$(dirname "$F")"
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">Декоратор</string>\n</resources>\n' > "$F"

      - name: flutter pub get
        run: flutter pub get
        working-directory: /tmp/app

      - name: flutter build apk
        run: flutter build apk --release --split-per-abi
        working-directory: /tmp/app

      - name: Переименовать APK
        run: |
          LABEL="${{ steps.ver.outputs.label }}"
          SRC="/tmp/app/build/app/outputs/flutter-apk"
          mkdir -p dist
          cp "$SRC/app-arm64-v8a-release.apk"  "dist/Decorator-${LABEL}-arm64.apk"
          cp "$SRC/app-armeabi-v7a-release.apk" "dist/Decorator-${LABEL}-arm32.apk"
          cp "$SRC/app-x86_64-release.apk"      "dist/Decorator-${LABEL}-x86_64.apk"

      - name: Загрузить артефакт (все запуски)
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.ver.outputs.label }}
          path: dist/
          retention-days: 30

      - name: GitHub Release (только тег или dispatch)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Декоратор ${{ steps.ver.outputs.version }}
          body: |
            ## Android APK

            | Файл | Архитектура | Устройства |
            |------|-------------|------------|
            | `Decorator-*-arm64.apk` | arm64-v8a | Современные телефоны ✅ |
            | `Decorator-*-arm32.apk` | armeabi-v7a | Старые телефоны |
            | `Decorator-*-x86_64.apk` | x86_64 | Эмуляторы |

            **Установка:** Настройки → Безопасность → Разрешить установку из неизвестных источников.

            ### Windows (.exe)
            Файл `Декоратор.exe` — в вложениях ниже.
          files: |
            dist/Decorator-${{ steps.ver.outputs.label }}-arm64.apk
            dist/Decorator-${{ steps.ver.outputs.label }}-arm32.apk
            dist/Decorator-${{ steps.ver.outputs.label }}-x86_64.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
