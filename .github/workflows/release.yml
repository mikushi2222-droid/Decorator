name: Сборка Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия (например v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Определить версию
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}"           >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-$(git rev-parse --short HEAD)"  >> "$GITHUB_OUTPUT"
          fi

      - name: Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

      - name: Установить goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Сгенерировать Windows-ресурс
        run: $(go env GOPATH)/bin/goversioninfo -o resource_windows_amd64.syso versioninfo.json

      - name: Собрать EXE
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -trimpath -o "Декоратор.exe" .

      - name: Загрузить артефакт (все запуски)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ steps.tag.outputs.value }}
          path: Декоратор.exe
          retention-days: 30

      - name: Создать git-тег (только dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.value }}" -m "Release ${{ steps.tag.outputs.value }}" || true
          git push origin "${{ steps.tag.outputs.value }}" || true

      - name: GitHub Release (только тег или dispatch)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: "Декоратор ${{ steps.tag.outputs.value }}"
          body: |
            ## Декоратор — приложение для ООО «АКЦЕНТ»

            Офлайн-приложение для оформления расходных накладных,
            расчёта штукатурки и работы с каталогом РРЦ.
            Работает без интернета, все данные хранятся локально.

            ---

            ### 📥 Установка (Windows)

            1. Скачайте **`Декоратор.exe`** ниже
            2. Запустите двойным кликом — откроется браузер с приложением
            3. Оставьте окно открытым во время работы

            ### ⚠️ Windows SmartScreen

            Нажмите **«Подробнее»** → **«Выполнить в любом случае»**.
            Программа работает только локально (127.0.0.1) — не вирус.

            ---

            ### 📦 Что включено

            - Каталог РРЦ: **552 позиции** (KIITOS · OLSTA · DECORAZZA · BAYRAMIX · PRORAB · ECOTINT · Инструменты)
            - Поиск по каталогу с фильтром по брендам
            - Экспорт накладных в **PDF** и **Word (.docx)**
            - Реквизиты ООО «АКЦЕНТ» на накладных
            - Калькулятор материала и работ

            ### 📱 Android APK

            Файлы `.apk` — в вложениях ниже (если запущен воркфлоу Android).
          files: "Декоратор.exe"
          draft: false
          prerelease: false
